# Builds and tests InstaCropper; packages macOS, Windows and Linux for real builds.
#
#   * Every push/PR  -> restore, build, test.
#   * Push to master -> build the macOS .app + Windows/Linux binaries and upload
#                       them as workflow *artifacts* named with a "-dev.<sha>"
#                       version. No tag, no GitHub release is created.
#   * Push of a v* tag (created manually for real releases) -> build all
#                       platforms and publish a GitHub release for that version.
# See https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net
name: .NET

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write   # required to create releases on tag pushes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore --configuration Release
    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal

  package:
    # Real builds package the macOS app: pushes to master (-> artifact) or a v* tag (-> release).
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    needs: build
    runs-on: macos-latest   # macOS is required to build the .app droplet
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0   # full history + tags are needed to compute the dev version
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Determine version
      id: version
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
          # Tag build (manual, real release): use the exact tagged version.
          VERSION="${GITHUB_REF#refs/tags/}"
          IS_RELEASE=true
        else
          # Master build: bump the patch of the last real release tag for naming only.
          # No tag is created for these dev builds.
          LAST_TAG="$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)"
          LAST_TAG="${LAST_TAG:-v0.0.0}"
          BASE="${LAST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          PATCH=$((PATCH + 1))
          VERSION="v${MAJOR}.${MINOR}.${PATCH}-dev.$(git rev-parse --short HEAD)"
          IS_RELEASE=false
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"
        echo "Resolved version: $VERSION (is_release=$IS_RELEASE)"

    - name: Build macOS app
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        bash macos/build-macos-app.sh "${VERSION#v}" artifacts
        ditto -c -k --keepParent "artifacts/InstaCropper.app" "artifacts/InstaCropper-macos-${VERSION}.zip"

    - name: Build Windows and Linux binaries
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        NUMERIC="${VERSION#v}"; NUMERIC="${NUMERIC%%-*}"
        for RID in win-x64 linux-x64; do
          dotnet publish InstaCropper/InstaCropper.csproj \
            -c Release -r "$RID" --self-contained true \
            -p:PublishSingleFile=true \
            -p:Version="$NUMERIC" \
            -p:InformationalVersion="${VERSION#v}" \
            -o "artifacts/$RID"
          rm -f "artifacts/$RID"/*.pdb
          (cd "artifacts/$RID" && zip -r "../InstaCropper-$RID-${VERSION}.zip" .)
        done

    # Master / dev build: keep all platform zips as downloadable workflow artifacts only.
    - name: Upload build artifacts
      if: steps.version.outputs.is_release == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: InstaCropper-${{ steps.version.outputs.version }}
        path: artifacts/InstaCropper-*.zip
        if-no-files-found: error

    # Tag build: publish a real GitHub release (all platforms) for the manually created tag.
    - name: Create release
      if: steps.version.outputs.is_release == 'true'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        gh release create "$VERSION" artifacts/InstaCropper-*.zip \
          --title "InstaCropper $VERSION" \
          --generate-notes
